server {
  listen 80;
  server_name _;

  # CRA build output
  root /usr/share/nginx/html;
  index index.html;

  # Uploads can be large (PDF). Adjust as needed.
  client_max_body_size 250m;

  # Swagger UI & ReDoc (FastAPI docs)
  location /docs {
    proxy_pass http://api:8000/docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /redoc {
    proxy_pass http://api:8000/redoc;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /openapi.json {
    proxy_pass http://api:8000/openapi.json;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API -> FastAPI main (which proxies unknown routes to legacy Node)
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long-running requests (upload finalize / OCR / chat)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # ไม่ cache หน้าแรกและ JS เพื่อให้เปิดจาก IP ได้ถูก (ไม่ใช้ของเก่าจาก cache)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri = /index.html;
  }
  location ~* \.(js|css)$ {
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # SPA routing fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
