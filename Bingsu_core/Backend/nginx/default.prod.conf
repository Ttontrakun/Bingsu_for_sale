# ใช้ Docker DNS (127.0.0.11) ให้ nginx resolve ชื่อ api/legacy ตอนมี request
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name _;

  # CRA build output
  root /usr/share/nginx/html;
  index index.html;

  # Uploads can be large (PDF). Adjust as needed.
  client_max_body_size 250m;

  # Upstream สำหรับ API — ใช้ตัวแปรให้ resolve ตอน request (แก้ 502 เมื่อ api ยังไม่พร้อมตอน web start)
  set $api_upstream http://api:8000;
  set $legacy_upstream http://legacy:5052;

  # Chat streaming — proxy ตรงไป legacy เพื่อไม่ buffer (FastAPI proxy จะ buffer ทั้งก้อน)
  location /api/chat/stream {
    proxy_pass $legacy_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Swagger UI & ReDoc (FastAPI docs)
  location /docs {
    proxy_pass $api_upstream/docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /redoc {
    proxy_pass $api_upstream/redoc;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /openapi.json {
    proxy_pass $api_upstream/openapi.json;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API -> Node legacy (bb Docker Compose ไม่มี service api:8000 — ถ้าส่งไป api จะ Network error)
  # ถ้ารัน FastAPI gateway แยกและตั้งชื่อ service ว่า api ให้เปลี่ยนกลับเป็น proxy_pass $api_upstream;
  location /api/ {
    proxy_pass $legacy_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # OCR / บันทึก+แปลง vector ใช้เวลานาน — 20 นาที
    proxy_connect_timeout 60s;
    proxy_send_timeout 1200s;
    proxy_read_timeout 1200s;
  }

  # ไม่ cache หน้าแรกและ JS เพื่อให้เปิดจาก IP ได้ถูก (ไม่ใช้ของเก่าจาก cache)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri = /index.html;
  }
  location ~* \.(js|css)$ {
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # SPA routing fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
