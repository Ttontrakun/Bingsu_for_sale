<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="clipCircleMale">
      <circle cx="64" cy="64" r="54" />
    </clipPath>
  </defs>

  <!-- ring + background to match UI circle -->
  <circle cx="64" cy="64" r="58" fill="#FFFFFF" />
  <circle cx="64" cy="64" r="58" stroke="#0B0F19" stroke-width="6" />
  <circle cx="64" cy="64" r="54" fill="#EEF2F7" />

  <g clip-path="url(#clipCircleMale)">
    <!-- shirt -->
    <path d="M22 132c7-32 30-48 42-48s35 16 42 48" fill="#CFE1FF" />
    <!-- collar / neck shadow -->
    <path d="M48 90l16-10 16 10-8 16H56l-8-16Z" fill="#B7D0FF" />

    <!-- tie -->
    <path d="M64 80l14 18-14 28-14-28 14-18Z" fill="#0B3A8A" />
    <path d="M64 80l14 18-14 10-14-10 14-18Z" fill="#12449B" opacity="0.85" />

    <!-- neck -->
    <path d="M56 86h16v14c0 6-16 6-16 0V86Z" fill="#F2C3A6" />

    <!-- face -->
    <path d="M64 38c-18 0-30 12-30 28v8c0 18 12 32 30 32s30-14 30-32v-8c0-16-12-28-30-28Z" fill="#F7C9AA" />

    <!-- eyes -->
    <ellipse cx="54" cy="69" rx="6" ry="8" fill="#1F2937" />
    <ellipse cx="74" cy="69" rx="6" ry="8" fill="#1F2937" />

    <!-- cheeks -->
    <circle cx="47" cy="77" r="6" fill="#F28C9B" opacity="0.45" />
    <circle cx="81" cy="77" r="6" fill="#F28C9B" opacity="0.45" />

    <!-- mouth -->
    <path d="M55 86c6 8 12 8 18 0" stroke="#E85A6A" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- hair (brown) -->
    <path
      d="M34 60c0-26 18-40 30-40s30 14 30 40c0 8-2 14-6 18v-10c0-10-8-18-24-18s-24 8-24 18v10c-4-4-6-10-6-18Z"
      fill="#A45C2A"
    />
    <!-- hair bang -->
    <path d="M42 62c5-18 18-28 22-28s17 10 22 28c-5-4-12-6-22-6s-17 2-22 6Z" fill="#8F4D22" opacity="0.95" />
  </g>
</svg>
