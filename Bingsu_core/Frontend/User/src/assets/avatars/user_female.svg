<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="clipCircleFemale">
      <circle cx="64" cy="64" r="54" />
    </clipPath>
  </defs>

  <!-- ring + background -->
  <circle cx="64" cy="64" r="58" fill="#FFFFFF" />
  <circle cx="64" cy="64" r="58" stroke="#0B0F19" stroke-width="6" />
  <circle cx="64" cy="64" r="54" fill="#EEF2F7" />

  <g clip-path="url(#clipCircleFemale)">
    <!-- shirt -->
    <path d="M22 132c9-34 32-50 42-50s33 16 42 50" fill="#7AD7DE" />
    <!-- v-collar -->
    <path d="M46 96l18-14 18 14-10 18H56l-10-18Z" fill="#68C9D1" />

    <!-- neck -->
    <path d="M56 86h16v14c0 6-16 6-16 0V86Z" fill="#F2C3A6" />

    <!-- face -->
    <path d="M64 38c-18 0-30 12-30 28v8c0 18 12 32 30 32s30-14 30-32v-8c0-16-12-28-30-28Z" fill="#F7C9AA" />

    <!-- eyes -->
    <ellipse cx="54" cy="69" rx="6" ry="8" fill="#1F2937" />
    <ellipse cx="74" cy="69" rx="6" ry="8" fill="#1F2937" />

    <!-- mouth -->
    <path d="M56 86c4 6 12 6 16 0" stroke="#E85A6A" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- hair (dark navy, long) -->
