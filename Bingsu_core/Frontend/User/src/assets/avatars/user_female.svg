    />
    <!-- hair sides -->
    <path d="M22 110c5-28 16-40 28-44v40c-10 6-22 6-28 4Z" fill="#052A45" opacity="0.98" />
    <path d="M106 110c-5-28-16-40-28-44v40c10 6 22 6 28 4Z" fill="#052A45" opacity="0.98" />
    <!-- middle part -->
    <path d="M64 44c-5 0-10 2-12 6 2 6 3 10 4 18 2 12 4 20 8 20s6-8 8-20c1-8 2-12 4-18-2-4-7-6-12-6Z" fill="#052A45" opacity="0.55" />
  </g>
</svg>
