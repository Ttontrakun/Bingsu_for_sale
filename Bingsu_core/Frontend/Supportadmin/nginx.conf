server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so nginx re-resolves 'legacy' on every request
    # instead of caching the IP at startup (which breaks after container restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large file uploads (PDF/images for OCR)
    client_max_body_size 250m;

    # Route API calls from Supportadmin to legacy backend in Docker network.
    location /api/ {
        set $backend http://legacy:5052;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OCR / vector indexing can take a long time
        proxy_connect_timeout 60s;
        proxy_send_timeout 1200s;
        proxy_read_timeout 1200s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
